name: Build and Push Euserv Docker 镜像

on:
  push:
    branches: [ main ]                # 仅在推送到 main 分支时检查
    paths:                            # 仅当以下路径模式匹配时才触发
      - '**.py'                        # 所有 .py 文件（包括子目录）
      - '**.sh'                         # 所有 .sh 文件（包括子目录）
  workflow_dispatch:                   # 始终允许手动触发
    inputs:
      image_name:
        description: '自定义镜像名称'
        required: false
        default: 'euserv-renewer'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 镜像名称：手动触发时使用输入值，否则使用默认值
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name || 'euserv-tg-wx-diy1.61' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            # 仅在默认分支（如 main）上生成 latest 标签
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
